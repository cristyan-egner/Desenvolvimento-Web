<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UrbanStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">

    <div class="logo">
      UrbanStore
    </div>

    <nav aria-label="Menu principal">

      <ul class="menu">

        <li><a href="#inicio">Home</a></li>
        <li><a href="#contato">Contato</a></li>

      </ul>

    </nav>

  </header>

  <!-- INICIO -->
  <section class="inicio" id="inicio">

    <div class="inicio-content">

      <h1>Nova Coleção 2026</h1>

      <p>
        Produtos modernos com qualidade premium
        e entrega para todo o Brasil.
      </p>

      <button><a href="loja.html" target="_blank">Comprar Agora</a></button>

    </div>

  </section>

  <!-- FORMULARIO -->
  <section class="formulario" id="contato">

    <h2>Receba Ofertas Exclusivas</h2>

    <p>
      Cadastre seus dados e receba promoções.
    </p>

    <form>


      <input
        type="name"
        id="name"
        placeholder="Digite seu nome completo"
        required>

      <input
        type="tel"
        id="telephone"
        placeholder="Digite seu número de telefone"
        required>

      <input
        type="email"
        id="email"
        placeholder="Digite seu email"
        required>
        

      <a href="#inicio">
        <button type="submit">Cadastrar</button>
      </a>

    </form>

  </section>

  <!-- FOOTER -->
  <footer class="footer">

    <p>
      © 2026 UrbanStore - Todos os direitos reservados
    </p>

  </footer>

</body>
</html>
